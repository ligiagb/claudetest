<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Paws & Prey</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; font-family: system-ui, sans-serif; }
  canvas { display: block; touch-action: none; cursor: none; }
  #score { position: fixed; top: 16px; right: 20px; color: rgba(255,255,255,0.55); font-size: 22px; font-weight: bold; pointer-events: none; user-select: none; transition: transform 0.15s ease; }
  #score.pop { transform: scale(1.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score">Catches: 0</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();
let audioCtx = null;
function unlockAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function squeak() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
  const t = audioCtx.currentTime;
  osc.frequency.setValueAtTime(900, t); osc.frequency.exponentialRampToValueAtTime(550, t + 0.1);
  gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.start(t); osc.stop(t + 0.15);
}
function scurrySound() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.07, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.04;
  const src = audioCtx.createBufferSource(), gain = audioCtx.createGain();
  src.buffer = buf; src.connect(gain); gain.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
  src.start(t);
}
const STATES = { IDLE: 0, WANDER: 1, FLEE: 2, PAUSE: 3 };
const mouse = { x: 0, y: 0, heading: 0, targetHeading: 0, speed: 0, state: STATES.WANDER, stateTimer: 0, headingTimer: 0, tail: [], walkPhase: 0, distTraveled: 0, stunTimer: 0 };
const TAIL_LEN = 10;
function initMouse() {
  mouse.x = W * 0.5; mouse.y = H * 0.5;
  mouse.heading = Math.random() * Math.PI * 2; mouse.targetHeading = mouse.heading;
  mouse.tail = Array.from({length: TAIL_LEN}, () => ({x: mouse.x, y: mouse.y}));
  mouse.stateTimer = 1.5; mouse.state = STATES.WANDER;
}
function setState(s) {
  mouse.state = s;
  switch (s) {
    case STATES.IDLE: mouse.stateTimer = 0.5 + Math.random() * 1.5; break;
    case STATES.WANDER: mouse.stateTimer = 1.5 + Math.random() * 2.5; break;
    case STATES.FLEE: mouse.stateTimer = 0.8 + Math.random() * 0.5; break;
    case STATES.PAUSE: mouse.stateTimer = 0.2 + Math.random() * 0.3; break;
  }
}
let cursorX = -999, cursorY = -999;
function updateMouse(dt) {
  if (mouse.stunTimer > 0) { mouse.stunTimer -= dt; return; }
  const distToCursor = Math.hypot(mouse.x - cursorX, mouse.y - cursorY);
  const threatened = distToCursor < 180;
  if (threatened && mouse.state !== STATES.FLEE) setState(STATES.FLEE);
  mouse.stateTimer -= dt; mouse.headingTimer -= dt;
  if (mouse.stateTimer <= 0 && mouse.state !== STATES.FLEE) {
    const r = Math.random();
    if (mouse.state === STATES.IDLE) setState(r < 0.7 ? STATES.WANDER : STATES.PAUSE);
    else if (mouse.state === STATES.WANDER) { if (r < 0.15) setState(STATES.IDLE); else if (r < 0.25) setState(STATES.PAUSE); else setState(STATES.WANDER); }
    else if (mouse.state === STATES.PAUSE) setState(STATES.WANDER);
  }
  if (mouse.state === STATES.FLEE && mouse.stateTimer <= 0 && !threatened) setState(STATES.PAUSE);
  let targetSpeed = 0, turnRate = 2;
  switch (mouse.state) {
    case STATES.IDLE: targetSpeed = 0; turnRate = 1; break;
    case STATES.WANDER: targetSpeed = 80; turnRate = 2; break;
    case STATES.FLEE: targetSpeed = 260; turnRate = 6; break;
    case STATES.PAUSE: targetSpeed = 0; turnRate = 3; break;
  }
  if (mouse.headingTimer <= 0) {
    if (mouse.state === STATES.FLEE) mouse.targetHeading = Math.atan2(mouse.y - cursorY, mouse.x - cursorX) + (Math.random() - 0.5) * 0.8;
    else mouse.targetHeading += (Math.random() - 0.5) * 1.2;
    mouse.headingTimer = mouse.state === STATES.FLEE ? 0.2 + Math.random() * 0.2 : 0.3 + Math.random() * 0.5;
  }
  const margin = 70;
  if (mouse.y < margin) mouse.targetHeading = Math.PI * 0.5 + (Math.random()-0.5)*0.5;
  if (mouse.y > H - margin) mouse.targetHeading = -Math.PI * 0.5 + (Math.random()-0.5)*0.5;
  if (mouse.x < margin) mouse.targetHeading = (Math.random()-0.5)*0.5;
  if (mouse.x > W - margin) mouse.targetHeading = Math.PI + (Math.random()-0.5)*0.5;
  let dh = mouse.targetHeading - mouse.heading;
  while (dh > Math.PI) dh -= Math.PI * 2;
  while (dh < -Math.PI) dh += Math.PI * 2;
  mouse.heading += dh * turnRate * dt;
  mouse.speed += (targetSpeed - mouse.speed) * 8 * dt;
  const prevX = mouse.x, prevY = mouse.y;
  mouse.x += Math.cos(mouse.heading) * mouse.speed * dt;
  mouse.y += Math.sin(mouse.heading) * mouse.speed * dt;
  mouse.x = Math.max(30, Math.min(W - 30, mouse.x));
  mouse.y = Math.max(30, Math.min(H - 30, mouse.y));
  const d = Math.hypot(mouse.x - prevX, mouse.y - prevY);
  mouse.distTraveled += d; mouse.walkPhase += d * 0.08;
  mouse.tail.unshift({x: mouse.x, y: mouse.y});
  if (mouse.tail.length > TAIL_LEN) mouse.tail.pop();
}
const effects = [];
function addRipple(x, y, hit) { effects.push({type:'ripple', x, y, maxR: hit?55:40, age:0, life:0.5, hit}); }
function addPawPrint(x, y, hit) { effects.push({type:'paw', x, y, age:0, life:2.5, hit}); }
function addCatchBurst(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = (i/8)*Math.PI*2;
    effects.push({type:'star', x, y, vx:Math.cos(angle)*(60+Math.random()*60), vy:Math.sin(angle)*(60+Math.random()*60), age:0, life:0.6});
  }
}
function updateEffects(dt) { for (let i=effects.length-1;i>=0;i--) { effects[i].age+=dt; if(effects[i].age>=effects[i].life) effects.splice(i,1); } }
function drawBackground() {
  const grad = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.8);
  grad.addColorStop(0,'#1a2035'); grad.addColorStop(1,'#0a0d14');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
}
function drawMouse() {
  const m=mouse, stun=m.stunTimer>0;
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.heading);
  if (m.tail.length>2) {
    ctx.save(); ctx.rotate(-m.heading); ctx.translate(-m.x,-m.y);
    ctx.beginPath(); ctx.moveTo(m.tail[0].x,m.tail[0].y);
    for (let i=1;i<m.tail.length-1;i++) {
      const mx2=(m.tail[i].x+m.tail[i+1].x)/2, my2=(m.tail[i].y+m.tail[i+1].y)/2;
      ctx.quadraticCurveTo(m.tail[i].x,m.tail[i].y,mx2,my2);
    }
    const tg=ctx.createLinearGradient(m.tail[0].x,m.tail[0].y,m.tail[m.tail.length-1].x,m.tail[m.tail.length-1].y);
    tg.addColorStop(0,stun?'#ff9999':'#a08878'); tg.addColorStop(1,'rgba(160,136,120,0)');
    ctx.strokeStyle=tg; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke(); ctx.restore();
  }
  const legAnim=Math.sin(m.walkPhase)*3;
  ctx.fillStyle=stun?'#ffaaaa':'#b0a090';
  const feet=[{x:-6,y:10+(legAnim>0?legAnim:0)},{x:-6,y:-10+(legAnim<0?-legAnim:0)},{x:8,y:10+(legAnim<0?-legAnim:0)},{x:8,y:-10+(legAnim>0?legAnim:0)}];
  for (const f of feet) { ctx.beginPath(); ctx.ellipse(f.x,f.y,5,4,0,0,Math.PI*2); ctx.fill(); }
  ctx.fillStyle=stun?'#ffcccc':'#c8b4a0';
  ctx.beginPath(); ctx.ellipse(0,0,18,13,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(18,0,11,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=stun?'#ffbbbb':'#d4c0b0';
  ctx.beginPath(); ctx.ellipse(15,-10,5,7,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(22,-9,4,6,0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=stun?'#ff8888':'#e8a0a0';
  ctx.beginPath(); ctx.ellipse(15,-10,3,5,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(22,-9,2.5,4,0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=stun?'#ff4444':'#2a1a0a';
  ctx.beginPath(); ctx.arc(21,-3,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(22,-3.5,1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e87878'; ctx.beginPath(); ctx.ellipse(29,0,2.5,2,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=0.8;
  for (let i=0;i<3;i++) {
    ctx.beginPath(); ctx.moveTo(27,-i*2); ctx.lineTo(39,-i*2-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(27,i*2); ctx.lineTo(39,i*2+2); ctx.stroke();
  }
  ctx.restore();
}
function drawPawPrint(x,y,alpha,hit) {
  ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=hit?'rgba(100,220,120,1)':'rgba(180,180,180,1)';
  ctx.beginPath(); ctx.ellipse(x,y,10,8,0,0,Math.PI*2); ctx.fill();
  for (const t of [{dx:-8,dy:-9},{dx:-3,dy:-12},{dx:3,dy:-12},{dx:8,dy:-9}]) { ctx.beginPath(); ctx.ellipse(x+t.dx,y+t.dy,4,3.5,0,0,Math.PI*2); ctx.fill(); }
  ctx.restore();
}
function drawEffects() {
  for (const e of effects) {
    const t=e.age/e.life;
    if (e.type==='ripple') {
      ctx.save(); ctx.strokeStyle=e.hit?`rgba(100,220,120,${1-t})`:`rgba(200,200,200,${(1-t)*0.5})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.maxR*t,0,Math.PI*2); ctx.stroke(); ctx.restore();
    } else if (e.type==='paw') {
      drawPawPrint(e.x,e.y,t<0.8?0.35:0.35*(1-(t-0.8)/0.2),e.hit);
    } else if (e.type==='star') {
      e.x+=e.vx*(1/60); e.y+=e.vy*(1/60); e.vx*=0.92; e.vy*=0.92;
      ctx.save(); ctx.fillStyle=`rgba(255,220,80,${1-t})`; ctx.beginPath(); ctx.arc(e.x,e.y,4*(1-t*0.5),0,Math.PI*2); ctx.fill(); ctx.restore();
    }
  }
}
function drawVignette(active) {
  if (!active) return;
  const grad=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  grad.addColorStop(0,'rgba(180,0,0,0)'); grad.addColorStop(1,'rgba(180,0,0,0.18)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
}
let catches=0;
function incrementScore() {
  catches++; scoreEl.textContent=`Catches: ${catches}`;
  scoreEl.classList.remove('pop'); void scoreEl.offsetWidth; scoreEl.classList.add('pop');
}
function handleTap(x,y) {
  cursorX=x; cursorY=y;
  const hit=Math.hypot(x-mouse.x,y-mouse.y)<=55;
  addRipple(x,y,hit); addPawPrint(x,y,hit);
  if (hit && mouse.stunTimer<=0) {
    squeak(); addCatchBurst(mouse.x,mouse.y); incrementScore(); mouse.stunTimer=0.35;
    setTimeout(()=>{
      let nx,ny;
      do { nx=80+Math.random()*(W-160); ny=80+Math.random()*(H-160); } while(Math.hypot(nx-x,ny-y)<200);
      mouse.x=nx; mouse.y=ny; mouse.tail=Array.from({length:TAIL_LEN},()=>({x:nx,y:ny}));
      setState(STATES.FLEE); scurrySound();
    },350);
  }
}
canvas.addEventListener('pointerdown',(e)=>{ unlockAudio(); e.preventDefault(); handleTap(e.clientX,e.clientY); });
canvas.addEventListener('pointermove',(e)=>{ cursorX=e.clientX; cursorY=e.clientY; });
canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); unlockAudio(); handleTap(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
async function requestWakeLock() { try { if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(_){} }
document.addEventListener('pointerdown',requestWakeLock,{once:true});
let lastTime=null;
function render() {
  ctx.clearRect(0,0,W,H); drawBackground(); drawEffects(); drawMouse(); drawVignette(mouse.state===STATES.FLEE);
}
function gameLoop(ts) {
  if(!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  updateMouse(dt); updateEffects(dt); render(); requestAnimationFrame(gameLoop);
}
initMouse(); requestAnimationFrame(gameLoop);
</script>
</body>
</html>
